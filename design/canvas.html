<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dogfood — canvas layout (Grida-style)</title>
  <style>
    :root {
      --ink:#1c1c1e; --gray:#8a8a8f; --gray2:#b3b3b8; --hairline:#e8e8ec;
      --card:#f3f3f6; --surface:#ffffff; --page:#f5f5f7; --blue:#007aff; --red:#ff453a;
      --font:-apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif;
      --mono:"Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
      --shadow:0 1px 2px rgba(0,0,0,.05), 0 10px 30px rgba(0,0,0,.10);
      --shadow-sm:0 1px 2px rgba(0,0,0,.06);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body { font-family:var(--font); color:var(--ink); -webkit-font-smoothing:antialiased;
      letter-spacing:-0.01em; overflow:hidden; user-select:none;
      background:linear-gradient(135deg, #dbe6f5 0%, #eef1f5 30%, #f5f5f7 60%); }
    button { font:inherit; cursor:pointer; border:0; background:none; color:inherit; }
    svg { display:block; }

    .gc { display:flex; height:100vh; padding:0; }

    /* mock macOS traffic lights (sandbox-only) */
    .traffic { position:fixed; top:14px; left:14px; z-index:50; display:flex; gap:8px; }
    .traffic i { width:12px; height:12px; border-radius:50%; box-shadow:inset 0 0 0 .5px rgba(0,0,0,.15); }
    .traffic .r{background:#ff5f57;} .traffic .y{background:#febc2e;} .traffic .g{background:#28c840;}

    /* ---------- left panel ---------- */
    .left { width:290px; flex:none; background:var(--surface); border-right:1px solid var(--hairline);
      display:flex; flex-direction:column; }
    .left-head { height:54px; flex:none; display:flex; align-items:center; gap:9px; padding:0 16px 0 76px; }
    .left-head .mark { width:24px; height:24px; border-radius:7px; background:#111; display:grid; place-items:center; }
    .left-head .mark svg { width:15px; height:15px; color:#fff; }
    .left-head .name { font-weight:650; font-size:15px; }
    .badge { font-size:10.5px; font-weight:600; color:var(--gray); border:1px solid var(--hairline);
      border-radius:999px; padding:2px 9px; }
    .sec { padding:14px 12px 6px; }
    .sec-head { display:flex; align-items:center; justify-content:space-between; padding:0 6px 10px; }
    .sec-head h4 { font-size:13px; font-weight:600; color:var(--ink); }
    .sec-head .add { width:22px; height:22px; border-radius:6px; display:grid; place-items:center; color:var(--gray); }
    .sec-head .add:hover { background:var(--card); color:var(--ink); }
    .row { display:flex; align-items:center; gap:9px; height:34px; padding:0 10px; border-radius:8px;
      font-size:13.5px; color:var(--ink); cursor:pointer; }
    .row:hover { background:var(--card); }
    .row.sel { background:#eef0f2; }
    .row.scene.sel { background:var(--card); }
    .row .gi { color:var(--gray2); display:grid; place-items:center; }
    .row .gi svg { width:15px; height:15px; }
    .row .chev { color:var(--gray2); }
    .row .chev svg { width:13px; height:13px; }
    .layer-list { padding:0 12px; }
    .divider { height:1px; background:var(--hairline); margin:8px 12px; }

    /* ---------- center canvas ---------- */
    .center { flex:1; min-width:0; display:flex; flex-direction:column; position:relative;
      background:var(--page); }
    .ruler-top { height:26px; flex:none; display:flex; align-items:flex-end; position:relative;
      border-bottom:1px solid var(--hairline); padding-left:26px; color:var(--gray2);
      font-size:10px; font-family:var(--mono); }
    .ruler-top span { position:absolute; bottom:3px; transform:translateX(-50%); }
    .ruler-top .b { color:var(--blue); } .ruler-top .r { color:var(--red); }
    .canvas-row { flex:1; min-height:0; display:flex; position:relative; }
    .ruler-left { width:26px; flex:none; border-right:1px solid var(--hairline); position:relative;
      color:var(--gray2); font-size:10px; font-family:var(--mono); }
    .ruler-left span { position:absolute; left:50%; transform:translate(-50%, -50%) rotate(-90deg); white-space:nowrap; }
    .canvas { flex:1; min-width:0; position:relative; overflow:hidden;
      background-color:var(--page);
      background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'><path d='M20 16.5v7M16.5 20h7' stroke='%23d2d2d8' stroke-width='1'/></svg>");
      background-size:40px 40px; }
    .plus-fab { position:absolute; top:16px; left:16px; width:42px; height:42px; border-radius:50%;
      background:var(--surface); box-shadow:var(--shadow); border:1px solid var(--hairline);
      display:grid; place-items:center; color:var(--ink); }
    .plus-fab svg { width:20px; height:20px; }
    .blank-hint { position:absolute; inset:0; display:grid; place-items:center; pointer-events:none; }
    .blank-hint .chip { display:flex; align-items:center; gap:9px; background:var(--surface);
      border:1px solid var(--hairline); box-shadow:var(--shadow-sm); border-radius:999px;
      padding:9px 16px; font-size:13px; color:var(--gray); }
    .blank-hint .chip b { color:var(--ink); font-weight:600; }
    .blank-hint .chip svg { width:15px; height:15px; color:var(--blue); }

    /* floating toolbar */
    .toolbar { position:absolute; left:50%; bottom:22px; transform:translateX(-50%);
      display:flex; align-items:center; gap:4px; background:var(--surface);
      box-shadow:var(--shadow); border:1px solid var(--hairline); border-radius:999px; padding:7px 12px; }
    .tool { height:38px; border-radius:11px; display:flex; align-items:center; gap:3px; padding:0 8px; color:var(--ink); }
    .tool:hover { background:var(--card); }
    .tool.on { background:#eef0f2; }
    .tool svg { width:20px; height:20px; }
    .tool .car { color:var(--gray2); }
    .tool .car svg { width:13px; height:13px; }
    .tool-div { width:1px; height:22px; background:var(--hairline); margin:0 4px; }
    .swatch { width:26px; height:26px; border-radius:50%; background:#111; margin:0 4px; box-shadow:inset 0 0 0 1px rgba(0,0,0,.08); }

    /* ---------- right panel ---------- */
    .right { width:304px; flex:none; background:var(--surface); border-left:1px solid var(--hairline);
      display:flex; flex-direction:column; }
    .right-head { height:54px; flex:none; display:flex; align-items:center; gap:10px; padding:0 14px; }
    .right-head .me { width:28px; height:28px; border-radius:50%; background:var(--card);
      display:grid; place-items:center; font-size:10px; font-weight:700; color:var(--gray); }
    .right-head .zoom { margin-left:auto; display:flex; align-items:center; gap:5px; font-size:13px; font-weight:600;
      border:1px solid var(--hairline); border-radius:8px; padding:5px 9px; }
    .right-head .zoom svg { width:12px; height:12px; color:var(--gray); }
    .right-head .run { width:30px; height:30px; border-radius:8px; display:grid; place-items:center; color:var(--ink); }
    .right-head .run:hover { background:var(--card); }
    .tabs { display:flex; gap:18px; padding:4px 18px 0; border-bottom:1px solid var(--hairline); }
    .tab { padding:8px 0 12px; font-size:14px; font-weight:600; color:var(--gray); position:relative; cursor:pointer; }
    .tab.on { color:var(--ink); }
    .tab.on::after { content:''; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--ink); border-radius:2px; }
    .pbody { flex:1; overflow-y:auto; padding:14px 16px 30px; }
    .toolbar-mini { display:flex; justify-content:flex-end; gap:6px; margin-bottom:14px; }
    .toolbar-mini .mi { width:30px; height:30px; border-radius:8px; display:grid; place-items:center; color:var(--gray); border:1px solid var(--hairline); }
    .namebar { display:flex; align-items:center; gap:8px; margin-bottom:18px; }
    .namebar .ck { width:18px; height:18px; border-radius:5px; border:1.5px solid var(--ink); display:grid; place-items:center; color:var(--ink); flex:none; }
    .namebar .ck svg { width:12px; height:12px; }
    .field { flex:1; border:1px solid var(--hairline); border-radius:9px; padding:8px 11px; font-size:13.5px; font-weight:500; }
    .lock { width:34px; height:34px; border:1px solid var(--hairline); border-radius:9px; display:grid; place-items:center; color:var(--gray); flex:none; }
    .lock svg { width:15px; height:15px; }
    .plabel { font-size:14px; font-weight:600; margin:6px 0 12px; }
    .align { display:flex; gap:10px; margin-bottom:18px; }
    .align .grp { display:flex; border:1px solid var(--hairline); border-radius:9px; overflow:hidden; }
    .align .grp button { width:34px; height:32px; display:grid; place-items:center; color:var(--gray); border-right:1px solid var(--hairline); }
    .align .grp button:last-child { border-right:0; }
    .align .grp button:hover { background:var(--card); color:var(--ink); }
    .align .grp button svg { width:15px; height:15px; }
    .posgrid { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px; margin-bottom:18px; }
    .num { border:1px solid var(--hairline); border-radius:9px; padding:9px 11px; font-size:13.5px; text-align:center; font-variant-numeric:tabular-nums; }
    .pad { width:84px; height:84px; border:1px solid var(--hairline); border-radius:10px; display:grid; place-items:center; justify-self:center; position:relative; }
    .pad::before, .pad::after { content:''; position:absolute; background:var(--hairline); }
    .pad::before { left:50%; top:14px; bottom:14px; width:1px; }
    .pad::after { top:50%; left:14px; right:14px; height:1px; }
    .pad .dot { width:9px; height:9px; border-radius:2px; border:1.5px solid var(--gray2); background:var(--surface); z-index:1; }
    .field-row { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
    .field-row label { font-size:13.5px; color:var(--gray); width:54px; }
    .field-row .num { flex:1; text-align:left; }
    .layout-head { font-size:14px; font-weight:600; border-top:1px solid var(--hairline); padding-top:16px; margin-bottom:14px; }
    .flow { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .flow label { font-size:13.5px; color:var(--gray); width:54px; }
    .flow .opts { display:flex; border:1px solid var(--hairline); border-radius:9px; overflow:hidden; }
    .flow .opts button { width:38px; height:32px; display:grid; place-items:center; color:var(--gray); border-right:1px solid var(--hairline); }
    .flow .opts button:last-child { border-right:0; }
    .flow .opts button.on { background:#eef0f2; color:var(--ink); }
    .flow .opts svg { width:15px; height:15px; }

    .help { position:fixed; right:18px; bottom:18px; width:36px; height:36px; border-radius:50%;
      background:#111; color:#fff; display:grid; place-items:center; box-shadow:var(--shadow); z-index:40; }
    .help svg { width:17px; height:17px; }
  </style>
</head>
<body>
  <div class="traffic"><i class="r"></i><i class="y"></i><i class="g"></i></div>

  <div class="gc">
    <!-- ================= LEFT ================= -->
    <aside class="left">
      <div class="left-head">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></div>
        <span class="name">Dogfood</span>
        <span class="badge">BETA</span>
      </div>

      <div class="sec">
        <div class="sec-head"><h4>Scenes</h4><button class="add"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button></div>
        <div class="row scene sel">main</div>
      </div>

      <div class="divider"></div>

      <div class="sec">
        <div class="sec-head"><h4>Layers</h4></div>
      </div>
      <div class="layer-list" style="overflow-y:auto;">
        <div class="row"><span class="chev"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="gi"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/></svg></span>Component</div>
        <div class="row sel"><span class="chev"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="gi"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/></svg></span>Button</div>
        <div class="row"><span class="chev"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="gi"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/></svg></span>Card</div>
      </div>
    </aside>

    <!-- ================= CENTER ================= -->
    <section class="center">
      <div class="ruler-top">
        <span style="left:120px">-1500</span><span style="left:280px">-1000</span>
        <span class="b" style="left:360px">-611</span><span style="left:440px">-500</span>
        <span style="left:600px">0</span><span class="b" style="left:760px">469</span>
        <span class="r" style="left:840px">728</span><span style="left:1000px">1500</span>
        <span style="left:1160px">2000</span>
      </div>
      <div class="canvas-row">
        <div class="ruler-left">
          <span style="top:120px">-1000</span><span style="top:300px">-500</span>
          <span style="top:480px">0</span><span style="top:660px">500</span><span style="top:840px">1000</span>
        </div>
        <div class="canvas">
          <button class="plus-fab"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg></button>

          <div class="blank-hint">
            <div class="chip"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M7 10l3 2.5-3 2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Blank canvas — ask <b>Claude&nbsp;Code</b> to build a React component</div>
          </div>

          <div class="toolbar">
            <button class="tool on"><svg viewBox="0 0 24 24" fill="none"><path d="M5 3l15 9-6 1.5L11 20 5 3Z" fill="currentColor"/></svg><span class="car"><svg viewBox="0 0 24 24" fill="none"><path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></button>
            <button class="tool"><svg viewBox="0 0 24 24" fill="none"><path d="M5 9h14M5 15h14M9 5v14M15 5v14" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span class="car"><svg viewBox="0 0 24 24" fill="none"><path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></button>
            <button class="tool"><svg viewBox="0 0 24 24" fill="none"><path d="M5 6h14M12 6v13M9 19h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
            <button class="tool"><svg viewBox="0 0 24 24" fill="none"><path d="M18 5L6 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
            <button class="tool"><svg viewBox="0 0 24 24" fill="none"><path d="M5 19c4-1 7-4 9-9l3 3c-5 2-8 5-9 9l-3-3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg><span class="car"><svg viewBox="0 0 24 24" fill="none"><path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></button>
            <span class="tool-div"></span>
            <span class="swatch"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- ================= RIGHT ================= -->
    <aside class="right">
      <div class="right-head">
        <div class="me">ME</div>
        <button class="zoom">10%<svg viewBox="0 0 24 24" fill="none"><path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="run"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7V5Z"/></svg></button>
      </div>
      <div class="tabs">
        <div class="tab on">Inspect</div>
        <div class="tab">Agent</div>
      </div>
      <div class="pbody">
        <div class="toolbar-mini">
          <span class="mi"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4v16M12 4a8 8 0 0 1 0 16" stroke="currentColor" stroke-width="1.6"/></svg></span>
          <span class="mi"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/><rect x="8" y="8" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/></svg></span>
        </div>

        <div class="namebar">
          <span class="ck"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4 10-10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <input class="field" value="Button" />
          <span class="lock"><svg viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.6"/></svg></span>
        </div>

        <div class="plabel">Position</div>
        <div class="align">
          <div class="grp">
            <button><svg viewBox="0 0 24 24" fill="none"><path d="M4 4v16M9 8h8M9 16h5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></button>
            <button><svg viewBox="0 0 24 24" fill="none"><path d="M12 4v16M8 8h8M9 16h6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></button>
            <button><svg viewBox="0 0 24 24" fill="none"><path d="M20 4v16M7 8h8M10 16h5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></button>
          </div>
          <div class="grp">
            <button><svg viewBox="0 0 24 24" fill="none"><path d="M4 4h16M8 9v8M16 9v5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></button>
            <button><svg viewBox="0 0 24 24" fill="none"><path d="M4 12h16M8 8v8M16 9v6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></button>
            <button><svg viewBox="0 0 24 24" fill="none"><path d="M4 20h16M8 7v8M16 10v5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></button>
          </div>
        </div>

        <div class="posgrid">
          <input class="num" value="-611" />
          <div class="pad"><span class="dot"></span></div>
          <input class="num" value="632" />
        </div>

        <div class="field-row"><label>Rotate</label><input class="num" value="0" /></div>

        <div class="layout-head">Layout</div>
        <div class="flow">
          <label>Flow</label>
          <div class="opts">
            <button class="on"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/></svg></button>
            <button><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M12 4v16" stroke="currentColor" stroke-width="1.6"/></svg></button>
            <button><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M4 12h16" stroke="currentColor" stroke-width="1.6"/></svg></button>
            <button><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M12 4v16M4 12h16" stroke="currentColor" stroke-width="1.6"/></svg></button>
          </div>
        </div>
        <div class="field-row"><label>Width</label><input class="num" value="1080" /></div>
      </div>
    </aside>
  </div>

  <button class="help"><svg viewBox="0 0 24 24" fill="none"><path d="M9.2 9a2.8 2.8 0 1 1 4 2.5c-.9.5-1.2 1-1.2 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="17.5" r="1.1" fill="currentColor"/></svg></button>
</body>
</html>
