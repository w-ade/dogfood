<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dogfood — design sandbox</title>

  <!-- The REAL app stylesheet, copied verbatim from
       ~/Projects/dogfood/app/src/renderer/src/styles.css.
       Edit THIS file to restyle the app — changes map 1:1 back to the real styles.css. -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Sandbox-only mocks (NOT part of the app). Keeps styles.css a pure mirror.
       Real app: Dials = inline dialkit panel, Terminal = live xterm/pty.
       Here both are faked so the shell renders standalone in a browser. -->
  <style>
    /* mock macOS traffic lights — the real app uses NATIVE controls; do NOT port */
    .cc-traffic { position: absolute; left: 18px; top: 18px;
      display: flex; align-items: center; gap: 8px; -webkit-app-region: no-drag; }
    .cc-traffic .tl { position: relative; width: 12px; height: 12px; border-radius: 50%;
      box-shadow: inset 0 0 0 0.5px rgba(0,0,0,.18); }
    .cc-traffic .red { background: #ff5f57; }
    .cc-traffic .yellow { background: #febc2e; }
    .cc-traffic .green { background: #28c840; }
    /* soft neutral desktop behind the window so the shell reads */
    body { background: #d9d9de; }

    /* mock dialkit panel (real app renders <DialRoot mode="inline" />) */
    .dials-mock { max-width: 520px; }
    .dials-mock .dm-title { font-size: 15px; font-weight: 600; color: var(--ink); margin: 2px 2px 12px; }
    .dials-mock .dm-row {
      display: grid; grid-template-columns: 80px 1fr 44px; align-items: center;
      gap: 12px; height: 34px; padding: 0 12px; margin-bottom: 8px;
      background: var(--fill); border-radius: 8px;
    }
    .dials-mock .dm-row .dm-label { font-size: 13px; color: var(--ink-2); }
    .dials-mock .dm-row .dm-track { position: relative; height: 4px; border-radius: 999px; background: rgba(0,0,0,.12); }
    .dials-mock .dm-row .dm-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 999px; background: var(--accent); }
    .dials-mock .dm-row .dm-val { font-size: 13px; color: var(--ink); text-align: right; font-variant-numeric: tabular-nums; }
    .dials-mock .dm-toggle { justify-self: end; display: flex; gap: 0; background: var(--fill-2); border-radius: 7px; padding: 2px; }
    .dials-mock .dm-toggle span { font-size: 12px; color: var(--ink-2); padding: 3px 10px; border-radius: 5px; }
    .dials-mock .dm-toggle span.on { background: var(--panel); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.12); }

    /* mock terminal text (real app renders <Terminal />) */
    .term-mock { height: 100%; font-family: var(--mono); font-size: 13px; line-height: 1.5; color: var(--ink); white-space: pre-wrap; }
    .term-mock .cur { display: inline-block; width: 7px; height: 15px; background: #007aff; vertical-align: text-bottom; animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <!-- ===== Dogfood shell — full-width stage + bottom dock ===== -->
  <div class="cc cc-light" id="cc">

    <!-- mock macOS traffic lights (sandbox-only) -->
    <div class="cc-traffic" title="mock window controls">
      <span class="tl red"></span><span class="tl yellow"></span><span class="tl green"></span>
    </div>

    <!-- titlebar: breadcrumb -->
    <div class="cc-titlebar">
      <div class="cc-crumb">
        <span class="c-dim">New project</span>
        <span class="c-sep">/</span>
        <span class="c-cur">New</span>
      </div>
    </div>

    <!-- main: stage + right-side vertical dock -->
    <div class="cc-main">
      <div class="cc-stage"></div>
      <div class="cc-dock" id="dock" style="width: 420px;">
          <div class="cc-dock-resize" id="dockResize" title="Drag to resize"></div>
          <div class="cc-dock-tabs">
            <span class="dtab on" data-pane="dials">Dials</span>
            <span class="dtab" data-pane="term">Terminal</span>
          </div>
          <div class="cc-dock-body">
            <!-- Dials pane (mock of inline dialkit) -->
            <div class="dock-pane dials" data-pane="dials" style="display:block;">
              <div class="dials-mock">
                <div class="dm-title">Parameters</div>
                <div class="dm-row"><span class="dm-label">Gain</span><span class="dm-track"><span class="dm-fill" style="width:40%"></span></span><span class="dm-val">0.8</span></div>
                <div class="dm-row"><span class="dm-label">Pan</span><span class="dm-track"><span class="dm-fill" style="width:50%"></span></span><span class="dm-val">0.0</span></div>
                <div class="dm-row"><span class="dm-label">Mix</span><span class="dm-track"><span class="dm-fill" style="width:50%"></span></span><span class="dm-val">50</span></div>
                <div class="dm-row"><span class="dm-label">Bypass</span><span></span><span class="dm-toggle"><span>Off</span><span class="on">On</span></span></div>
              </div>
            </div>
            <!-- Terminal pane (mock) -->
            <div class="dock-pane term" data-pane="term" style="display:none;">
              <div class="term-mock">wade@wades-MBP ~ % claude
<span style="color:var(--ink-2)">Welcome to Claude Code. Ask me to build a component…</span>
wade@wades-MBP ~ % <span class="cur"></span></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  <!-- minimal behavior so you design against real states (tab switch · dock resize · theme) -->
  <script>
    const cc = document.getElementById('cc');

    // dock tabs
    document.querySelectorAll('.cc-dock-tabs .dtab').forEach(tab => {
      tab.onclick = () => {
        const pane = tab.dataset.pane;
        document.querySelectorAll('.cc-dock-tabs .dtab').forEach(t => t.classList.toggle('on', t === tab));
        document.querySelectorAll('.dock-pane').forEach(p => p.style.display = p.dataset.pane === pane ? 'block' : 'none');
      };
    });

    // dock resize (drag left edge to grow)
    const dock = document.getElementById('dock');
    document.getElementById('dockResize').onmousedown = (e) => {
      e.preventDefault();
      const sx = e.clientX, sw = dock.offsetWidth;
      document.body.style.cursor = 'ew-resize';
      const move = (ev) => { dock.style.width = Math.min(Math.max(280, sw + (sx - ev.clientX)), window.innerWidth - 240) + 'px'; };
      const up = () => { document.body.style.cursor = ''; window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
      window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    };

    // press 'd' to preview dark mode
    window.addEventListener('keydown', e => {
      if (e.key === 'd' && !e.metaKey && !e.ctrlKey && document.activeElement.tagName !== 'INPUT') {
        const dark = cc.classList.toggle('cc-dark');
        cc.classList.toggle('cc-light', !dark);
      }
    });
  </script>
</body>
</html>
