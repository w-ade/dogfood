<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="cowboy.svg" />
<title>Dogfood — UI Gallery</title>
<style>
  :root{--ink:#272727;--soft:#3a3a3c;--label:#9a9a9a;--faint:#b6b6b6;--line:#ececec;--chip:#f4f4f5;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",sans-serif;
    --mono:"Geist Mono",ui-monospace,"SF Mono",Menlo,monospace;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased;letter-spacing:-.011em;font-size:14px;padding:0 0 100px}
  a{color:inherit;text-decoration:none}
  .top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
  .top .in{max-width:1040px;margin:0 auto;padding:13px 32px;display:flex;align-items:center;gap:10px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px;letter-spacing:-.02em}
  .brand img{width:22px;height:22px;border-radius:6px}
  .top .sub{color:var(--label);font-size:13px}
  .top .back{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--label)}
  .top .back:hover{color:var(--ink)}
  .wrap{max-width:1040px;margin:0 auto;padding:48px 32px}
  h2{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--label);margin:42px 0 14px}
  h2:first-child{margin-top:0}
  .lbl{font-size:12px;font-weight:600;color:var(--faint);margin:0 0 9px}
  .row{display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start}

  /* ---- app frame (recreates the Cursor-style app) ---- */
  .frame{--b:#1c1c1c;--bar:#1e1e1e;--edge:rgba(255,255,255,.08);--mut:#8c8c8c;--dim:#6a6a6a;--fg:#d6d6d6;--chip2:#2c2c2d;--chipbd:#3a3a3b;
    width:880px;max-width:100%;height:560px;border-radius:14px;overflow:hidden;border:1px solid var(--edge);
    background:var(--b);color:var(--fg);display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.16)}
  .frame.light{--b:#f3f3f3;--bar:#ececec;--edge:#e3e3e3;--mut:#6e6e6e;--dim:#a0a0a0;--fg:#202020;--chip2:#fff;--chipbd:#d6d6d6;border-color:#e3e3e3}
  .g-title{height:34px;flex:none;display:flex;align-items:center;padding:0 12px 0 16px;border-bottom:1px solid var(--edge);position:relative}
  .g-lights{display:flex;gap:7px}
  .g-lights i{width:11px;height:11px;border-radius:50%}
  .g-lights .r{background:#ff5f57}.g-lights .y{background:#febc2e}.g-lights .g{background:#28c840}
  .g-tt{position:absolute;left:0;right:0;text-align:center;font-size:12.5px;font-weight:600;color:var(--mut)}
  .g-tr{margin-left:auto;display:flex;align-items:center;gap:12px;color:var(--mut);z-index:1}
  .g-tr svg{width:15px;height:15px}
  .g-canvas{flex:1;min-height:0;display:flex;align-items:center;justify-content:center}
  .g-welcome{display:flex;flex-direction:column;align-items:center;gap:16px;transform:translateY(-6px)}
  .g-logo{width:80px;height:80px;opacity:.13}
  .g-sc{display:grid;grid-template-columns:max-content max-content;column-gap:16px;row-gap:7px;align-items:center}
  .g-sl{color:var(--dim);font-size:12.5px;text-align:right}
  .g-sk{display:flex;gap:5px}
  .g-key{min-width:20px;height:20px;padding:0 5px;border-radius:5px;background:var(--chip2);border:1px solid var(--chipbd);color:var(--mut);font-size:11px;display:grid;place-items:center}
  .g-body{flex:1;min-height:0;display:flex}
  .g-side{flex:0 0 42%;min-height:0;display:flex;flex-direction:column;border-left:1px solid var(--edge)}
  .g-ptabs{height:36px;flex:none;display:flex;align-items:center;gap:4px;padding:0 10px;border-bottom:1px solid var(--edge)}
  .g-tab{font-size:12px;color:var(--mut);padding:5px 10px;border-radius:7px}
  .g-tab.on{color:var(--fg);background:var(--chip2);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .g-chev{margin-left:auto;color:var(--mut);display:grid;place-items:center}
  .g-chev svg{width:16px;height:16px}
  .g-term{flex:1;padding:10px 16px;font-family:var(--mono);font-size:12.5px;color:var(--fg)}
  .g-term .d{width:8px;height:8px;border:1.4px solid var(--mut);border-radius:50%;display:inline-block;vertical-align:middle;margin-right:9px}
  .g-term .p{color:var(--mut)}
  .g-cur{display:inline-block;width:7px;height:14px;background:var(--fg);vertical-align:-2px;margin-left:2px}
  .g-status{height:26px;flex:none;display:flex;align-items:center;padding:0 14px;border-top:1px solid var(--edge)}
  .g-sr{margin-left:auto;color:var(--mut);display:grid;place-items:center}
  .g-sr svg{width:14px;height:14px}

  /* pieces */
  .panelbox{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff}
  .sw{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;max-width:600px}
  .sw .s{border:1px solid var(--line);border-radius:10px;overflow:hidden}.sw .s .c{height:46px}
  .sw .s .m{padding:7px 10px;font-size:11px}.sw .s .m b{display:block;font-size:12px}.sw .s .m span{color:var(--label);font-family:var(--mono);font-size:10px}
</style>
</head>
<body>
<header class="top"><div class="in">
  <a class="brand" href="index.html"><img src="cowboy.svg" alt="" />Dogfood</a>
  <span class="sub">UI Gallery</span>
  <a class="back" href="index.html">← Docs</a>
</div></header>

<div class="wrap" id="g"></div>

<script>
  const SUN='<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.7"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>'
  const MOON='<svg viewBox="0 0 24 24" fill="none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>'
  const GEAR='<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 13a7.8 7.8 0 0 0 0-2l2-1.5-2-3.4-2.3 1a7.6 7.6 0 0 0-1.7-1l-.3-2.6h-4l-.3 2.6a7.6 7.6 0 0 0-1.7 1l-2.3-1-2 3.4 2 1.5a7.8 7.8 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7.6 7.6 0 0 0 1.7 1l.3 2.6h4l.3-2.6a7.6 7.6 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>'
  const CHEV='<svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
  const PANELR='<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="1.7"/><path d="M15 4v16" stroke="currentColor" stroke-width="1.7"/></svg>'
  const LOG='<svg viewBox="0 0 24 24" fill="none"><path d="M3.5 12a8.5 8.5 0 1 0 2.6-6.1L3 8.5M3 4.5v4h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 8v4.2l2.8 1.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>'
  const SC=[['Hide Terminal',['⌘','J']],['Search Files',['⌘','P']],['Open Browser',['⇧','⌘','B']]]

  function frame(theme){
    const logo = theme==='dark' ? 'cowboy-inverse.svg' : 'cowboy.svg'
    const themeIcon = theme==='dark' ? SUN : MOON
    return `<div class="frame ${theme}">
      <div class="g-title"><div class="g-lights"><i class="r"></i><i class="y"></i><i class="g"></i></div><div class="g-tt">Dogfood</div><div class="g-tr">${PANELR}${themeIcon}${GEAR}</div></div>
      <div class="g-body">
        <div class="g-canvas"><div class="g-welcome"><img class="g-logo" src="${logo}" alt="">
          <div class="g-sc">${SC.map(([l,k])=>`<span class="g-sl">${l}</span><span class="g-sk">${k.map(x=>`<span class="g-key">${x}</span>`).join('')}</span>`).join('')}</div>
        </div></div>
        <div class="g-side">
          <div class="g-ptabs"><span class="g-tab on">Terminal</span><span class="g-tab">Layers</span><span class="g-chev">${CHEV}</span></div>
          <div class="g-term"><span class="d"></span><span class="p">$</span> npx tsc --noEmit 2&gt;&amp;1<div style="margin-top:6px"><span class="p">$</span> <span class="g-cur"></span></div></div>
        </div>
      </div>
      <div class="g-status"><div class="g-sr">${LOG}</div></div>
    </div>`
  }

  const SW=[['Ink','#1C1C1C'],['Surface','#FFFFFF'],['Blue','#007AFF'],['Green','#34C759'],['Geist Mono','mono']]
  document.getElementById('g').innerHTML = `
    <h2>Full app · Dark</h2>
    ${frame('dark')}
    <h2>Full app · Light</h2>
    ${frame('light')}
    <h2>Tokens</h2>
    <div class="sw">${SW.map(([n,h])=>h==='mono'?`<div class="s"><div class="c" style="background:#1c1c1c;display:grid;place-items:center"><span style="font-family:var(--mono);color:#fff;font-size:18px">Aa</span></div><div class="m"><b>${n}</b><span>terminal</span></div></div>`:`<div class="s"><div class="c" style="background:${h};${h==='#FFFFFF'?'border-bottom:1px solid var(--line)':''}"></div><div class="m"><b>${n}</b><span>${h}</span></div></div>`).join('')}</div>
  `
</script>
</body>
</html>
